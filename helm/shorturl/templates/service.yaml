apiVersion: v1
kind: Service
metadata:
  name: {{ include "shorturl.fullname" . }}
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "shorturl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
