{{- if .Values.postgres.deployed }}
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-migrate
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
  annotations:
    # post-install/post-upgrade, not pre-*: a pre-install hook runs before
    # Helm applies the release's normal manifests, so the postgres
    # Service/StatefulSet wouldn't exist yet - wait-for-postgres would spin
    # forever trying to resolve a Service that hasn't been created.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shorturl
        app.kubernetes.io/component: postgres-migrate
    spec:
      restartPolicy: Never
      {{- if .Values.ecrPull.enabled }}
      imagePullSecrets:
        - name: {{ .Values.ecrPull.secretName }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image }}"
          envFrom:
            - secretRef:
                name: postgres-credentials
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Values.postgres.host }} -p {{ .Values.postgres.port }} -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        # Migrations are embedded (go:embed) into this image at build time
        # from the ShortUrl repo itself (cmd/migrate) - same commit, same
        # tag as the app image, no separate ConfigMap to keep in sync by
        # hand.
        - name: migrate
          image: "{{ include "shorturl.imageRef" .Values.postgres.migrateImage }}"
          env:
            - name: POSTGRES_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: POSTGRES_SSLMODE
              value: {{ .Values.postgres.sslMode | quote }}
          envFrom:
            - secretRef:
                name: postgres-credentials
{{- end }}
