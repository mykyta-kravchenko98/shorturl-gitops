{{- if .Values.postgres.deployed }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials-pending
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: postgres-credentials-pending
    creationPolicy: Owner
    # Same reasoning as postgres-external-secret.yaml: don't let ArgoCD's
    # label-based tracking mistake this ESO-created Secret for an
    # orphaned/unmanaged member of the shorturl Application and prune it.
    template:
      metadata:
        labels: {}
        annotations: {}
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.secretsManagement.postgresSecretName | quote }}
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.secretsManagement.postgresSecretName | quote }}
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.secretsManagement.postgresSecretName | quote }}
        property: dbname
{{- end }}
