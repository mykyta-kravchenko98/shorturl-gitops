{{- if .Values.ecrPull.enabled }}
# Normal resource, not a hook - the seed Job (ecr-refresh-seed-job.yaml)
# covers "right after install/upgrade"; this covers "still running many
# hours later" (ECR tokens are only valid 12h).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-pull-refresh
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.ecrPull.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/name: shorturl
            app.kubernetes.io/component: ecr-pull-refresh
        spec:
          {{- include "shorturl.ecrRefreshPodSpec" .Values.ecrPull | nindent 10 }}
{{- end }}
