{{- if .Values.postgres.deployed }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.secretsManagement.awsRegion | quote }}
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: {{ .Values.secretsManagement.credentialsSecretName }}
            key: access-key-id
          secretAccessKeySecretRef:
            name: {{ .Values.secretsManagement.credentialsSecretName }}
            key: secret-access-key
{{- end }}
