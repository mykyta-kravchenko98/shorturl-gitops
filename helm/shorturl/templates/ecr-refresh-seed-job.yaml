{{- if .Values.ecrPull.enabled }}
# Runs once on install/upgrade so the pull secret exists immediately,
# before the CronJob's first scheduled tick - otherwise a fresh install
# would sit in ImagePullBackOff for up to ecrPull.schedule's interval.
apiVersion: batch/v1
kind: Job
metadata:
  name: ecr-pull-refresh-seed
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shorturl
        app.kubernetes.io/component: ecr-pull-refresh
    spec:
      {{- include "shorturl.ecrRefreshPodSpec" .Values.ecrPull | nindent 6 }}
{{- end }}
