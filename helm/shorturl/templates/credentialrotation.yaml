{{- if .Values.postgres.deployed }}
apiVersion: ops.amenotejikara.dev/v1alpha1
kind: CredentialRotation
metadata:
  name: shorturl-postgres
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
spec:
  pendingSecretRef:
    name: postgres-credentials-pending
    usernameKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD
  liveSecretRef:
    name: postgres-credentials
    usernameKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD
  target:
    type: postgres
    postgres:
      host: {{ .Values.postgres.host | quote }}
      database: {{ .Values.postgres.dbName | quote }}
      port: {{ .Values.postgres.port | quote }}
      sslMode: {{ .Values.postgres.sslMode | quote }}
  workloadRefs:
    - apiVersion: apps/v1
      kind: Deployment
      name: {{ include "shorturl.fullname" . }}
      namespace: {{ .Release.Namespace }}
{{- end }}
