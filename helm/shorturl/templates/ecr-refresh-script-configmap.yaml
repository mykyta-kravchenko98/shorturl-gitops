{{- if .Values.ecrPull.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecr-pull-refresh-script
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
  annotations:
    # Same weight as the RBAC in ecr-refresh-rbac.yaml - both need to
    # exist before the seed Job (weight -10) runs.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
data:
  refresh.sh: |
    #!/usr/bin/env sh
    set -eu

    PASSWORD="$(aws ecr get-login-password --region "$ECR_REGION")"

    kubectl delete secret "$SECRET_NAME" --ignore-not-found -n "$POD_NAMESPACE"
    kubectl create secret docker-registry "$SECRET_NAME" \
      --docker-server="$ECR_REGISTRY" \
      --docker-username=AWS \
      --docker-password="$PASSWORD" \
      -n "$POD_NAMESPACE"

    echo "ecr pull secret '$SECRET_NAME' refreshed in namespace '$POD_NAMESPACE'"
{{- end }}
