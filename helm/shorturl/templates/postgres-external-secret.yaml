{{- if .Values.postgres.deployed }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  labels:
    {{- include "shorturl.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: postgres-credentials
    creationPolicy: Orphan
    # Without this, ESO copies this ExternalSecret's own labels (including
    # app.kubernetes.io/instance from shorturl.labels) onto the generated
    # Secret. ArgoCD's shorturl Application uses label-based resource
    # tracking + prune: true, and treats ANY object carrying that instance
    # label as belonging to it - even one it never rendered via Helm. That
    # swept up postgres-credentials on a routine sync and deleted it.
    # Empty label/annotation map here disables the copy-through entirely.
    template:
      metadata:
        labels: {}
        annotations: {}
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.secretsManagement.postgresSecretName | quote }}
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.secretsManagement.postgresSecretName | quote }}
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.secretsManagement.postgresSecretName | quote }}
        property: dbname
{{- end }}
