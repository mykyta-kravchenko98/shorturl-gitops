apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

configMapGenerator:
  - name: grafana-dashboard-shorturl
    namespace: observability
    files:
      - shorturl-load-overview.json

  - name: grafana-dashboard-kurama
    namespace: observability
    files:
      - kurama-store-overview.json

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
