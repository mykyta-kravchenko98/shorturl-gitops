apiVersion: apps/v1
kind: Deployment
metadata:
  name: kurama-manager
  labels:
    app.kubernetes.io/name: kurama
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 120
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kurama
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kurama
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: kurama-manager
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: manager
          image: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/kurama@sha256:313af5c8afa187dbcbebced945309b33de796a5540b9e80f4e39332269673cf6
          imagePullPolicy: IfNotPresent

          ports:
            - name: health
              containerPort: 8081
              protocol: TCP

          startupProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz-broken
              port: health
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3

          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KURAMA_RUNNER_IMAGE
              value: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/kurama@sha256:313af5c8afa187dbcbebced945309b33de796a5540b9e80f4e39332269673cf6
            - name: KURAMA_RUNNER_IMAGE_PULL_SECRET
              value: ecr-pull-secret
            - name: KURAMA_REDIS_ADDR
              value: kurama-redis.kurama-system.svc.cluster.local:6379
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
