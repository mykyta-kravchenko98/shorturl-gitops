apiVersion: apps/v1
kind: Deployment
metadata:
  name: kurama-manager
  labels:
    app.kubernetes.io/name: kurama
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kurama
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kurama
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: kurama-manager
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: manager
          image: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/kurama@sha256:44d5230991b8ff1330d1af7ff70c5c14746dff829bacf6d86528a19010eb8af6
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KURAMA_RUNNER_IMAGE
              value: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/kurama@sha256:44d5230991b8ff1330d1af7ff70c5c14746dff829bacf6d86528a19010eb8af6
            - name: KURAMA_RUNNER_IMAGE_PULL_SECRET
              value: ecr-pull-secret
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
