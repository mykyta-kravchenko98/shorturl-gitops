apiVersion: apps/v1
kind: Deployment
metadata:
  name: kurama-manager
  labels:
    app.kubernetes.io/name: kurama
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kurama
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kurama
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: kurama-manager
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: manager
          image: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/kurama@sha256:8e47b6d0dfbd36fa4ca2b24aaf152f2920ae240b612173c626a5f4391b84e230
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KURAMA_RUNNER_IMAGE
              value: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/kurama@sha256:8e47b6d0dfbd36fa4ca2b24aaf152f2920ae240b612173c626a5f4391b84e230
            - name: KURAMA_RUNNER_IMAGE_PULL_SECRET
              value: ecr-pull-secret
            - name: KURAMA_REDIS_ADDR
              value: kurama-redis.kurama-system.svc.cluster.local:6379
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
