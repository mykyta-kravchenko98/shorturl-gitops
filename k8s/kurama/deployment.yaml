apiVersion: apps/v1
kind: Deployment
metadata:
  name: kurama-manager
  labels:
    app.kubernetes.io/name: kurama
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kurama
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kurama
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: kurama-manager
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: manager
          image: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/kurama@sha256:f4d33fdbaa9466735407f99c914cd8208bb8dce68653f3acb2d41c0cd69fe930
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KURAMA_RUNNER_IMAGE
              value: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/kurama@sha256:f4d33fdbaa9466735407f99c914cd8208bb8dce68653f3acb2d41c0cd69fe930
            - name: KURAMA_RUNNER_IMAGE_PULL_SECRET
              value: ecr-pull-secret
            - name: KURAMA_REDIS_ADDR
              value: kurama-redis.kurama-system.svc.cluster.local:6379
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
