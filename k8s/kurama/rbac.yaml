apiVersion: v1
kind: ServiceAccount
metadata:
  name: kurama-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kurama-manager
rules:
  - apiGroups: ["traffic.kurama.dev"]
    resources: ["trafficscenarios"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["traffic.kurama.dev"]
    resources: ["trafficscenarios/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kurama-manager
subjects:
  - kind: ServiceAccount
    name: kurama-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kurama-manager
