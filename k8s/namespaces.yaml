# Namespaces created up front (rather than left to `syncOptions:
# CreateNamespace=true`) because the shorturl namespace needs a label the
# otel-sidecar-injector's MutatingWebhookConfiguration selects on -
# CreateNamespace alone won't add it.
apiVersion: v1
kind: Namespace
metadata:
  name: shorturl
  labels:
    otel-injection: enabled
    # Kubernetes 1.21+ adds this automatically to every namespace - declare
    # it here too so it's not perpetual drift (git says "not present", API
    # server keeps re-adding it -> ArgoCD flips Synced/OutOfSync forever).
    kubernetes.io/metadata.name: shorturl
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    kubernetes.io/metadata.name: observability
---
apiVersion: v1
kind: Namespace
metadata:
  name: otel-sidecar-injector
  labels:
    kubernetes.io/metadata.name: otel-sidecar-injector
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    kubernetes.io/metadata.name: cert-manager
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    kubernetes.io/metadata.name: external-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: kurama-system
  labels:
    kubernetes.io/metadata.name: kurama-system
