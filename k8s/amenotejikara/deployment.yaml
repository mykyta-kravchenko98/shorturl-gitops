apiVersion: apps/v1
kind: Deployment
metadata:
  name: amenotejikara-manager
  labels:
    app.kubernetes.io/name: amenotejikara
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amenotejikara
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amenotejikara
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: amenotejikara-manager
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: manager
          image: 528081867341.dkr.ecr.eu-central-1.amazonaws.com/amenotejikara:bbd2968626ae3f1b0ac7b61478b70b61ca60ef96
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP

          startupProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
