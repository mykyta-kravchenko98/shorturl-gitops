---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: credentialrotations.ops.amenotejikara.dev
spec:
  group: ops.amenotejikara.dev
  names:
    kind: CredentialRotation
    listKind: CredentialRotationList
    plural: credentialrotations
    singular: credentialrotation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.lastRotatedAt
      name: Last Rotated
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CredentialRotation keeps a stateful backend's credential in sync with a
          value rotated into PendingSecretRef, then rolls WorkloadRefs. See the
          project README for the full design and the two-Secret consistency model.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CredentialRotationSpec is the user-authored, desired state.
            properties:
              liveSecretRef:
                description: |-
                  LiveSecretRef is the Secret consumers actually mount. The controller
                  is the sole writer of this Secret's credential keys - it only
                  updates them after confirming the backend accepted the new value.
                properties:
                  name:
                    description: Name of the Secret.
                    type: string
                  passwordKey:
                    description: PasswordKey is the key in the Secret's data holding
                      the password.
                    type: string
                  usernameKey:
                    description: UsernameKey is the key in the Secret's data holding
                      the username.
                    type: string
                required:
                - name
                - passwordKey
                - usernameKey
                type: object
              pendingSecretRef:
                description: |-
                  PendingSecretRef is the Secret something else (typically an
                  ExternalSecret) syncs a freshly-rotated credential into. The
                  controller only ever reads this Secret.
                properties:
                  name:
                    description: Name of the Secret.
                    type: string
                  passwordKey:
                    description: PasswordKey is the key in the Secret's data holding
                      the password.
                    type: string
                  usernameKey:
                    description: UsernameKey is the key in the Secret's data holding
                      the username.
                    type: string
                required:
                - name
                - passwordKey
                - usernameKey
                type: object
              target:
                description: Target describes the backend to keep in sync with LiveSecretRef.
                properties:
                  postgres:
                    description: |-
                      PostgresTarget holds what's needed to connect to a Postgres database
                      whose user password should track LiveSecretRef. It deliberately does not
                      include credentials - those come from LiveSecretRef/PendingSecretRef.
                    properties:
                      database:
                        type: string
                      host:
                        type: string
                      port:
                        default: "5432"
                        type: string
                      sslMode:
                        default: disable
                        type: string
                    required:
                    - database
                    - host
                    type: object
                  type:
                    enum:
                    - postgres
                    type: string
                required:
                - type
                type: object
              workloadRefs:
                description: WorkloadRefs lists workloads to roll after a successful
                  rotation.
                items:
                  description: |-
                    WorkloadRef identifies a workload to roll once a rotation has been
                    applied to the backend, so it picks up the now-consistent LiveSecretRef.
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  - namespace
                  type: object
                type: array
            required:
            - liveSecretRef
            - pendingSecretRef
            - target
            type: object
          status:
            description: CredentialRotationStatus is the controller-owned observed
              state.
            properties:
              lastRotatedAt:
                format: date-time
                type: string
              message:
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the .metadata.generation the controller last
                  finished reconciling - lets `kubectl get` / callers tell "reflects
                  the latest spec edit" apart from "stale, reconcile still pending".
                format: int64
                type: integer
              phase:
                description: RotationPhase summarizes where a CredentialRotation currently
                  stands.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
