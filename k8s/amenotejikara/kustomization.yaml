apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The CRD itself is cluster-scoped and unaffected by this - kustomize
# knows not to inject a namespace into cluster-scoped kinds. Only the
# ServiceAccount/Role/RoleBinding/Deployment (all namespaced) pick it up.
namespace: shorturl

resources:
  - crd.yaml
  - rbac.yaml
  - deployment.yaml
