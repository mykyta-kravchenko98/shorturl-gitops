apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amenotejikara
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/mykyta-kravchenko98/shorturl-gitops.git
    targetRevision: main
    path: k8s/amenotejikara
  destination:
    server: https://kubernetes.default.svc
    namespace: shorturl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
