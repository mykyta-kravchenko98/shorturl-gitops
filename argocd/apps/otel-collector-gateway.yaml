apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mykyta-kravchenko98/shorturl-gitops.git
    targetRevision: main
    path: k8s/otel-collector
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
