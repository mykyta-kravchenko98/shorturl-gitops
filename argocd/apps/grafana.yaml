apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 8.5.5
    helm:
      values: |
        persistence:
          enabled: true
          size: 1Gi
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        # admin / <random, see below> - grab the real password after
        # install: kubectl -n observability get secret grafana -o
        # jsonpath='{.data.admin-password}' | base64 -d
        adminUser: admin
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                url: http://loki-stack.observability.svc.cluster.local:3100
                access: proxy
              - name: Tempo
                type: tempo
                url: http://tempo.observability.svc.cluster.local:3200
                access: proxy
              - name: Prometheus
                type: prometheus
                url: http://prometheus-server.observability.svc.cluster.local:80
                access: proxy
                isDefault: true
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
