apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 8.5.5
    helm:
      values: |
        persistence:
          enabled: true
          size: 1Gi
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        # admin / <random, see below> - grab the real password after
        # install: kubectl -n observability get secret grafana -o
        # jsonpath='{.data.admin-password}' | base64 -d
        adminUser: admin
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Loki
                uid: loki
                type: loki
                url: http://loki-stack.observability.svc.cluster.local:3100
                access: proxy
                jsonData:
                  derivedFields:
                    - name: TraceID
                      matcherRegex: '"trace_id":"([0-9a-fA-F]{32})"'
                      datasourceUid: tempo
                      url: '$${__value.raw}'
                      urlDisplayLabel: View trace
              - name: Tempo
                uid: tempo
                type: tempo
                url: http://tempo.observability.svc.cluster.local:3200
                access: proxy
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                    spanStartTimeShift: "-2s"
                    spanEndTimeShift: "2s"
                    filterByTraceID: false
                    filterBySpanID: false
                    customQuery: true
                    query: '{namespace=~".+"} | json | trace_id=`$${__trace.traceId}`'
              - name: Prometheus
                uid: prometheus
                type: prometheus
                url: http://prometheus-server.observability.svc.cluster.local:80
                access: proxy
                isDefault: true
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
