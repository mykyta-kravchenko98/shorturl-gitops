apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kurama-redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mykyta-kravchenko98/shorturl-gitops.git
    targetRevision: main
    path: k8s/kurama-redis
  destination:
    server: https://kubernetes.default.svc
    namespace: kurama-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
