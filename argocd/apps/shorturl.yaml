apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shorturl
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mykyta-kravchenko98/shorturl-gitops.git
    targetRevision: main
    path: helm/shorturl
    helm:
      valueFiles:
        - values.yaml
        - values-local.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: shorturl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # No CreateNamespace=true: the shorturl namespace is already created
    # (with the otel-injection label) by the namespaces Application -
    # having both manage the same Namespace object causes ArgoCD to flip
    # it between Synced/OutOfSync forever as they overwrite each other.
